# =============================================================================
# TELCO CUSTOMER CHURN — CI/CD con GitHub Actions
# =============================================================================
 
name: CI/CD Pipeline — Telco Churn
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
 
env:
  IMAGE_NAME: telco-churn-api
  REGISTRY: ghcr.io
  IMAGE_FULL: ghcr.io/${{ github.repository_owner }}/telco-churn-api
 
jobs:
 
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — CALIDAD DE CÓDIGO (linting)
  # ══════════════════════════════════════════════════════════════════════════
  lint:
    name: Linting (flake8)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
 
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Instalar herramientas de calidad
        run: pip install flake8 autopep8
 
      - name: Auto-fix espacios en blanco y formato básico
        run: |
          autopep8 --in-place --recursive \
            --select=W291,W292,W293,W391 \
            app/ tests/
 
      - name: Ejecutar flake8
        run: |
          flake8 app/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --statistics
 
 
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — PRUEBAS UNITARIAS
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Pruebas Unitarias (pytest)
    runs-on: ubuntu-latest
    needs: lint
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
 
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Instalar dependencias
        run: pip install -r requirements.txt
 
      - name: Crear directorio de reportes
        run: mkdir -p reports
 
      - name: Ejecutar pruebas unitarias
        run: |
          pytest tests/ \
            --ignore=tests/test_model.py \
            -v \
            --tb=short \
            --junitxml=reports/test-results.xml
 
      - name: Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports/test-results.xml
 
 
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — BUILD Y PUBLICACIÓN DE IMAGEN DOCKER
  # Solo se ejecuta en push a main y si las pruebas pasan
  # ══════════════════════════════════════════════════════════════════════════
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 
    permissions:
      contents: read
      packages: write
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
 
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FULL }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
 
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
      - name: Resumen del build
        run: |
          echo "### Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
 